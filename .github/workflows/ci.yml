name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy bandit safety pytest pytest-asyncio httpx

      - name: Generate domain data
        run: python domains/build_domains.py

      - name: Lint (imports / syntax)
        run: python -c "import backend.main; print('imports ok')"

      - name: Type check (mypy)
        run: mypy backend/ --ignore-missing-imports --no-strict-optional || true

      - name: Security scan (bandit)
        run: bandit -r backend/ sdk/ -ll || true

      - name: Dependency audit (safety)
        run: safety check -r requirements.txt || true

      - name: Unit + integration tests
        run: |
          pytest tests/ -v --tb=short || true
          python test_e2e.py
          python test_v21_integration.py

  build-artifacts:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build domain knowledge base
        run: python domains/build_domains.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: domain-data
          path: domains/*.json
